<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Depinus Splashscreen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Load generated CSS -->
    <link rel="stylesheet" href="splash/dist/splash.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        /* Fallback styles while React loads */
        .loading-fallback {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="loading-fallback">Loading Depinus...</div>
    </div>

    <!-- Load the bundled splash React app -->
    <script src="splash/dist/splash.js"></script>
</body>

</html>
